<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARDIONET: Cardiac Conduction Countdown</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            color: #fff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-weight: 700;
            text-transform: uppercase;
        }

        canvas {
            display: block;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        #introModal, #resetModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease-in-out;
            will-change: opacity;
        }

        #resetModal {
            display: none;
            opacity: 0;
            background: rgba(5, 5, 5, 0.9);
        }

        .modal-content {
            padding: 40px;
            text-align: center;
            max-width: 450px;
            letter-spacing: 0.2em;
            line-height: 1.8;
            font-size: 11px;
        }

        .action-btn {
            margin-top: 30px;
            background: #fff;
            color: #000;
            padding: 14px 35px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 900;
            transition: all 0.3s ease;
            display: inline-block;
            border: none;
            outline: none;
        }

        .action-btn:hover {
            transform: scale(1.05);
            letter-spacing: 0.35em;
            background: #ff4444;
            color: #fff;
        }

        #startBtn.loading {
            pointer-events: none;
            opacity: 0;
            transform: scale(0.9);
        }

        #topLeftControls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease 1s;
        }

        .hud-item {
            padding: 8px 16px;
            font-size: 9px;
            letter-spacing: 0.1em;
            width: fit-content;
        }

        .hud-label {
            opacity: 0.4;
            margin-right: 6px;
        }

        #audioHud {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 100;
            opacity: 0;
            transition: opacity 1s ease 1s;
        }

        .visualizer-bar {
            width: 3px;
            height: 15px;
            background: #ff4444;
            opacity: 0.2;
        }
    </style>
</head>

<body>

    <div id="introModal">
        <div class="modal-content glass-panel">
	    GOOGLE I/O 2026
            CARDIONET<br><br>
            ANATOMICAL HEART SONIFICATION. TISSUE EVOLVES 10→1. HOVER FOR CONDUCTION.
            <div id="startBtn" class="action-btn">INITIALIZE RHYTHM</div>
        </div>
    </div>

    <div id="resetModal">
        <div class="modal-content glass-panel">
            SEQUENCE COMPLETE<br><br>
            CARDIAC RHYTHM HAS REACHED TERMINAL VELOCITY. RESET TO STABILIZE SYSTEM.
            <div id="resetBtn" class="action-btn">RESET RHYTHM</div>
        </div>
    </div>

    <div id="topLeftControls">
        <div class="hud-item glass-panel"><span class="hud-label">TISSUE:</span><span id="labelOrganism">...</span></div>
        <div class="hud-item glass-panel"><span class="hud-label">BPM:</span><span id="labelScale">--</span></div>
        <div class="hud-item glass-panel"><span class="hud-label">CALCIUM:</span><span id="labelRoot">--</span></div>
        <div class="hud-item glass-panel"><span class="hud-label">CONTRACT:</span><span id="labelTexture">--</span></div>
    </div>

    <div id="audioHud">
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const DURATION_PER_NUMBER = 6000;
        const TOTAL_STALKS = 42000;

        const profiles = {
            10: { name: 'Normal Sinus', bpm: 60, colors: { g1: '#1a0505', g2: '#600000', edge: '#ff3333', peak: '#ffaaaa' } },
            9: { name: 'Accelerated Sinus', bpm: 72, colors: { g1: '#1a0505', g2: '#700000', edge: '#ff3333', peak: '#ffaaaa' } },
            8: { name: 'Mild Tachycardia', bpm: 85, colors: { g1: '#200000', g2: '#800000', edge: '#ff4444', peak: '#ffbbbb' } },
            7: { name: 'Sinus Tachycardia', bpm: 95, colors: { g1: '#200000', g2: '#800000', edge: '#ff4444', peak: '#ffbbbb' } },
            6: { name: 'Severe Tachycardia', bpm: 110, colors: { g1: '#250000', g2: '#900000', edge: '#ff5555', peak: '#ffcccc' } },
            5: { name: 'Critical SVT', bpm: 130, colors: { g1: '#250000', g2: '#900000', edge: '#ff5555', peak: '#ffcccc' } },
            4: { name: 'Ventricular Flutter', bpm: 160, colors: { g1: '#300000', g2: '#a00000', edge: '#ff6666', peak: '#ffdddd' } },
            3: { name: 'High SVT', bpm: 200, colors: { g1: '#300000', g2: '#b00000', edge: '#ff7777', peak: '#ffeeee' } },
            2: { name: 'V-Tach', bpm: 250, colors: { g1: '#350000', g2: '#c00000', edge: '#ffaa00', peak: '#ffffff' } },
            1: { name: 'V-Fibrillation', bpm: 300, colors: { g1: '#400000', g2: '#ff0000', edge: '#ffcc00', peak: '#ffffff' } }
        };

        let currentLevel = 10;
        let isStarted = false;
        let scene, camera, renderer, clock;
        let stalkInstancedMesh, tipInstancedMesh;
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2(-999, -999);
        let audioCtx, masterGain, analyser;
        let targetHeights = new Float32Array(TOTAL_STALKS);
        let currentHeights = new Float32Array(TOTAL_STALKS);
        let pulseTimeout;
        let transitionTimeout;

        const vertexShader = `
            attribute float aRandom;
            attribute float aHeight;
            varying float vNoise;
            varying float vDisplayHeight;
            uniform float uTime;
            uniform float uCalciumWave;
            uniform float uHeartRate;
            uniform vec2 uMouse;

            void main() {
                vNoise = aRandom;
                vDisplayHeight = aHeight;
                vec4 worldPos = instanceMatrix * vec4(position, 1.0);
                float distMouse = distance(worldPos.xz, uMouse);
                float mouseForce = smoothstep(20.0, 0.0, distMouse);
                float calciumLevel = sin(uCalciumWave + distance(worldPos.xz, vec2(0.0)) * 0.12) * 0.5 + 0.5;
                float bpmFactor = (uHeartRate / 60.0);
                float pulse = sin(uTime * bpmFactor * 3.14159 * 2.0) * 0.5 + 0.5;
                float lift = (calciumLevel * 0.7 + pulse * 0.3 + mouseForce * 0.5) * aHeight;
                worldPos.y += lift;
                gl_Position = projectionMatrix * viewMatrix * worldPos;
            }
        `;

        const fragmentShader = `
            varying float vNoise;
            varying float vDisplayHeight;
            uniform vec3 uColorGrnd1;
            uniform vec3 uColorGrnd2;
            uniform vec3 uColorEdge;
            uniform vec3 uColorPeak;
            uniform float uCalciumWave;

            void main() {
                vec3 base = mix(uColorGrnd1, uColorGrnd2, vNoise);
                float localPulse = sin(uCalciumWave + vNoise * 20.0) * 0.5 + 0.5;
                vec3 finalColor = mix(base, uColorEdge, localPulse * 0.4);
                if(vDisplayHeight > 1.0) {
                    float glow = smoothstep(1.0, 8.0, vDisplayHeight);
                    finalColor = mix(finalColor, uColorPeak, glow * 0.95);
                }
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        window.onload = () => {
            const startBtn = document.getElementById('startBtn');
            const resetBtn = document.getElementById('resetBtn');

            startBtn.onclick = () => {
                if (isStarted) return;
                startBtn.classList.add('loading');
                init();
            };

            resetBtn.onclick = () => {
                resetSystem();
            };
        };

        async function init() {
            isStarted = true;
            if (!audioCtx) initAudio();
            
            // Re-boost volume on init
            if (masterGain) {
                masterGain.gain.setTargetAtTime(1.8, audioCtx.currentTime, 0.1);
            }

            if (!scene) {
                initScene();
                await setupGeometryAsync();
            }
            
            document.getElementById('introModal').style.opacity = '0';
            document.querySelector('canvas').style.opacity = '1';
            document.getElementById('topLeftControls').style.opacity = '1';
            document.getElementById('audioHud').style.opacity = '1';
            
            setTimeout(() => { document.getElementById('introModal').style.display = 'none'; }, 1000);

            animate();
            currentLevel = 10;
            startLevelTransition();
            heartbeatLoop();

            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });
            window.addEventListener('resize', onWindowResize);
        }

        function resetSystem() {
            isStarted = false;
            clearTimeout(pulseTimeout);
            clearTimeout(transitionTimeout);
            
            const resetModal = document.getElementById('resetModal');
            const introModal = document.getElementById('introModal');
            const startBtn = document.getElementById('startBtn');

            resetModal.style.opacity = '0';
            setTimeout(() => {
                resetModal.style.display = 'none';
                introModal.style.display = 'flex';
                setTimeout(() => {
                    introModal.style.opacity = '1';
                    startBtn.classList.remove('loading');
                }, 50);
            }, 1000);

            document.querySelector('canvas').style.opacity = '0';
            document.getElementById('topLeftControls').style.opacity = '0';
            document.getElementById('audioHud').style.opacity = '0';
        }

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 1.8; 

            const compressor = audioCtx.createDynamicsCompressor();
            compressor.threshold.setValueAtTime(-10, audioCtx.currentTime);
            compressor.knee.setValueAtTime(40, audioCtx.currentTime);
            compressor.ratio.setValueAtTime(12, audioCtx.currentTime);
            compressor.attack.setValueAtTime(0, audioCtx.currentTime);
            compressor.release.setValueAtTime(0.25, audioCtx.currentTime);

            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 64;

            masterGain.connect(compressor);
            compressor.connect(analyser);
            analyser.connect(audioCtx.destination);
        }

        function heartbeatLoop() {
            if (!isStarted) return;

            const profile = profiles[currentLevel] || profiles[1];
            const bpm = profile.bpm;
            const interval = (60 / bpm) * 1000;

            playCardiacPulse(45, 0.45, 0.9, 200);

            setTimeout(() => {
                if (!isStarted) return;
                const dubFreq = 65 + (10 - currentLevel) * 5;
                playCardiacPulse(dubFreq, 0.35, 0.7, 400);
            }, interval * 0.32);

            pulseTimeout = setTimeout(heartbeatLoop, interval);
        }

        function playCardiacPulse(freq, decay, vol, filterFreq) {
            if (!audioCtx || !isStarted) return;
            const now = audioCtx.currentTime;
            
            const osc = audioCtx.createOscillator();
            const sub = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, now);
            osc.frequency.exponentialRampToValueAtTime(10, now + decay);

            sub.type = 'sine';
            sub.frequency.setValueAtTime(freq * 0.5, now);
            sub.frequency.exponentialRampToValueAtTime(5, now + decay);

            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(filterFreq, now);
            filter.Q.value = 5;

            osc.connect(filter);
            sub.connect(filter);
            filter.connect(gain);
            gain.connect(masterGain);

            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(vol, now + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.001, now + decay);

            osc.start(now);
            sub.start(now);
            osc.stop(now + decay + 0.1);
            sub.stop(now + decay + 0.1);
        }

        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            clock = new THREE.Clock();
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(0, 110, 180);
            camera.lookAt(0, 0, 0);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
        }

        async function setupGeometryAsync() {
            const stalkGeom = new THREE.CylinderGeometry(0.015, 0.015, 3.5, 4, 1);
            stalkGeom.translate(0, 1.75, 0);
            const stalkMat = new THREE.ShaderMaterial({
                vertexShader, fragmentShader,
                uniforms: {
                    uTime: { value: 0 }, uCalciumWave: { value: 0 }, uHeartRate: { value: 60 },
                    uMouse: { value: new THREE.Vector2() }, uColorGrnd1: { value: new THREE.Color() },
                    uColorGrnd2: { value: new THREE.Color() }, uColorEdge: { value: new THREE.Color() },
                    uColorPeak: { value: new THREE.Color() }
                }
            });

            stalkInstancedMesh = new THREE.InstancedMesh(stalkGeom, stalkMat, TOTAL_STALKS);
            tipInstancedMesh = new THREE.InstancedMesh(new THREE.SphereGeometry(0.09, 4, 4), stalkMat, TOTAL_STALKS);
            
            const randoms = new Float32Array(TOTAL_STALKS);
            const heights = new Float32Array(TOTAL_STALKS);
            const dummy = new THREE.Object3D();

            for (let i = 0; i < TOTAL_STALKS; i++) {
                if (i % 5000 === 0) await new Promise(r => requestAnimationFrame(r));
                const t = Math.random() * Math.PI * 2;
                const r = Math.sqrt(Math.random());
                const hx = 16 * Math.pow(Math.sin(t), 3) * r;
                const hy = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) * r;
                dummy.position.set(hx * 5.8, 0, (hy + 2.0) * 5.8); 
                dummy.updateMatrix();
                stalkInstancedMesh.setMatrixAt(i, dummy.matrix);
                tipInstancedMesh.setMatrixAt(i, dummy.matrix);
                randoms[i] = Math.random();
                heights[i] = 0.5; currentHeights[i] = 0.5; targetHeights[i] = 0.5;
            }

            stalkInstancedMesh.geometry.setAttribute('aRandom', new THREE.InstancedBufferAttribute(randoms, 1));
            stalkInstancedMesh.geometry.setAttribute('aHeight', new THREE.InstancedBufferAttribute(heights, 1));
            tipInstancedMesh.geometry.setAttribute('aRandom', new THREE.InstancedBufferAttribute(randoms, 1));
            tipInstancedMesh.geometry.setAttribute('aHeight', new THREE.InstancedBufferAttribute(heights, 1));
            
            scene.add(stalkInstancedMesh); 
            scene.add(tipInstancedMesh);
        }

        function startLevelTransition() {
            if (!isStarted) return;

            if (currentLevel < 1) {
                // Fade out audio on sequence complete
                if (masterGain) {
                    masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.3);
                }
                
                // Show reset screen
                const resetModal = document.getElementById('resetModal');
                resetModal.style.display = 'flex';
                setTimeout(() => resetModal.style.opacity = '1', 50);
                return;
            }

            const profile = profiles[currentLevel];
            document.getElementById('labelOrganism').innerText = profile.name;
            document.getElementById('labelScale').innerText = profile.bpm;
            document.getElementById('labelRoot').innerText = currentLevel > 4 ? 'STEADY' : 'FIBRILLATION';
            document.getElementById('labelTexture').innerText = currentLevel > 4 ? 'SMOOTH' : 'HYPERTROPHIC';
            
            const u = stalkInstancedMesh.material.uniforms;
            u.uColorGrnd1.value.set(profile.colors.g1);
            u.uColorGrnd2.value.set(profile.colors.g2);
            u.uColorEdge.value.set(profile.colors.edge);
            u.uColorPeak.value.set(profile.colors.peak);
            u.uHeartRate.value = profile.bpm;

            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'black'; ctx.fillRect(0, 0, 128, 128);
            ctx.fillStyle = 'white'; ctx.font = 'bold 90px Arial';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(currentLevel, 64, 64);
            const imgData = ctx.getImageData(0, 0, 128, 128).data;
            
            const matrix = new THREE.Matrix4();
            const pos = new THREE.Vector3();
            for (let i = 0; i < TOTAL_STALKS; i++) {
                stalkInstancedMesh.getMatrixAt(i, matrix);
                pos.setFromMatrixPosition(matrix);
                const ux = (pos.x / 140) + 0.5;
                const vy = ((pos.z / 5.8) - 2.0) / 25.5 + 0.5;
                let hTarget = 0.5 + Math.random() * 1.2;
                if (ux >= 0.1 && ux <= 0.9 && vy >= 0.1 && vy <= 0.9) {
                    if (imgData[(Math.floor(vy * 127) * 128 + Math.floor(ux * 127)) * 4] > 128) hTarget = 9.0 + Math.random() * 2.0;
                }
                targetHeights[i] = hTarget;
            }

            transitionTimeout = setTimeout(() => {
                if (isStarted) {
                    currentLevel--;
                    startLevelTransition();
                }
            }, DURATION_PER_NUMBER);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            if (!isStarted && currentLevel === 10) return; 
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            const u = stalkInstancedMesh.material.uniforms;
            u.uTime.value = time;
            u.uCalciumWave.value += delta * (u.uHeartRate.value / 60) * 3.5;

            const hAttrStalk = stalkInstancedMesh.geometry.attributes.aHeight;
            const hAttrTip = tipInstancedMesh.geometry.attributes.aHeight;
            for (let i = 0; i < TOTAL_STALKS; i++) {
                currentHeights[i] = THREE.MathUtils.lerp(currentHeights[i], targetHeights[i], 0.05);
                hAttrStalk.setX(i, currentHeights[i]); 
                hAttrTip.setX(i, currentHeights[i]);
            }
            hAttrStalk.needsUpdate = true; 
            hAttrTip.needsUpdate = true;

            raycaster.setFromCamera(mouse, camera);
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            const hit = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(plane, hit)) u.uMouse.value.set(hit.x, hit.z);

            if (analyser) {
                const d = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(d);
                const bars = document.querySelectorAll('.visualizer-bar');
                for(let i=0; i<bars.length; i++) {
                    bars[i].style.height = (d[i] / 255 * 30 + 10) + 'px';
                    bars[i].style.opacity = 0.2 + (d[i] / 255);
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
