<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARDIONET: Cardiac Conduction Countdown</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            color: #fff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-weight: 700;
            text-transform: uppercase;
        }

        canvas {
            display: block;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        #introModal,
        #resetModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease-in-out;
            will-change: opacity;
        }

        #resetModal {
            display: none;
            opacity: 0;
            background: rgba(5, 5, 5, 0.9);
        }

        .modal-content {
            padding: 40px;
            text-align: center;
            max-width: 450px;
            letter-spacing: 0.2em;
            line-height: 1.8;
            font-size: 11px;
        }

        .action-btn {
            margin-top: 30px;
            background: #fff;
            color: #000;
            padding: 14px 35px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 900;
            transition: all 0.3s ease;
            display: inline-block;
            border: none;
            outline: none;
        }

        .action-btn:hover {
            transform: scale(1.05);
            letter-spacing: 0.35em;
            background: #ff4444;
            color: #fff;
        }

        #startBtn.loading {
            pointer-events: none;
            opacity: 0;
            transform: scale(0.9);
        }

        #topLeftControls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease 1s;
        }

        .hud-item {
            padding: 8px 16px;
            font-size: 9px;
            letter-spacing: 0.1em;
            width: fit-content;
        }

        .hud-label {
            opacity: 0.4;
            margin-right: 6px;
        }

        #audioHud {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 100;
            opacity: 0;
            transition: opacity 1s ease 1s;
        }

        .visualizer-bar {
            width: 3px;
            height: 15px;
            background: #ff4444;
            opacity: 0.2;
        }

        @media (max-width: 768px) {
            .modal-content {
                padding: 25px;
                font-size: 10px;
                max-width: 90%;
            }

            .action-btn {
                padding: 12px 24px;
                font-size: 10px;
            }

            #topLeftControls {
                top: 10px;
                left: 10px;
                gap: 6px;
            }

            .hud-item {
                font-size: 8px;
                padding: 6px 10px;
            }

            #audioHud {
                bottom: 20px;
            }
        }
    </style>
</head>

<body>

    <div id="introModal">
        <div class="modal-content glass-panel">
            GOOGLE I/O 2026
            CARDIONET<br><br>
            ANATOMICAL HEART SONIFICATION. TISSUE EVOLVES 10→1. HOVER FOR CONDUCTION.
            <div id="startBtn" class="action-btn">INITIALIZE RHYTHM</div>
        </div>
    </div>

    <div id="resetModal">
        <div class="modal-content glass-panel">
            SEQUENCE COMPLETE<br><br>
            CARDIAC RHYTHM HAS REACHED TERMINAL VELOCITY. RESET TO STABILIZE SYSTEM.
            <div id="resetBtn" class="action-btn">RESET RHYTHM</div>
        </div>
    </div>

    <div id="topLeftControls">
        <div class="hud-item glass-panel">
            <span class="hud-label">TISSUE:</span><span id="labelOrganism">...</span>
        </div>
        <div class="hud-item glass-panel">
            <span class="hud-label">BPM:</span><span id="labelScale">--</span>
        </div>
        <div class="hud-item glass-panel">
            <span class="hud-label">CALCIUM:</span><span id="labelRoot">--</span>
        </div>
        <div class="hud-item glass-panel">
            <span class="hud-label">CONTRACT:</span><span id="labelTexture">--</span>
        </div>
    </div>

    <div id="audioHud">
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const DURATION_PER_NUMBER = 6000;
        const TOTAL_STALKS = /Mobi|Android/i.test(navigator.userAgent) ? 12000 : 42000;

        const profiles = {
            10: { name: 'Normal Sinus', bpm: 60, colors: { g1: '#1a0505', g2: '#600000', edge: '#ff3333', peak: '#ffaaaa' } },
            9: { name: 'Accelerated Sinus', bpm: 72, colors: { g1: '#1a0505', g2: '#700000', edge: '#ff3333', peak: '#ffaaaa' } },
            8: { name: 'Mild Tachycardia', bpm: 85, colors: { g1: '#200000', g2: '#800000', edge: '#ff4444', peak: '#ffbbbb' } },
            7: { name: 'Sinus Tachycardia', bpm: 95, colors: { g1: '#200000', g2: '#800000', edge: '#ff4444', peak: '#ffbbbb' } },
            6: { name: 'Severe Tachycardia', bpm: 110, colors: { g1: '#250000', g2: '#900000', edge: '#ff5555', peak: '#ffcccc' } },
            5: { name: 'Critical SVT', bpm: 130, colors: { g1: '#250000', g2: '#900000', edge: '#ff5555', peak: '#ffcccc' } },
            4: { name: 'Ventricular Flutter', bpm: 160, colors: { g1: '#300000', g2: '#a00000', edge: '#ff6666', peak: '#ffdddd' } },
            3: { name: 'High SVT', bpm: 200, colors: { g1: '#300000', g2: '#b00000', edge: '#ff7777', peak: '#ffeeee' } },
            2: { name: 'V-Tach', bpm: 250, colors: { g1: '#350000', g2: '#c00000', edge: '#ffaa00', peak: '#ffffff' } },
            1: { name: 'V-Fibrillation', bpm: 300, colors: { g1: '#400000', g2: '#ff0000', edge: '#ffcc00', peak: '#ffffff' } }
        };

        let currentLevel = 10;
        let isStarted = false;
        let scene, camera, renderer, clock;
        let stalkInstancedMesh, tipInstancedMesh;
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2(-999, -999);
        let audioCtx, masterGain, analyser;
        let targetHeights = new Float32Array(TOTAL_STALKS);
        let currentHeights = new Float32Array(TOTAL_STALKS);
        let pulseTimeout;
        let transitionTimeout;

        let animationRunning = false;

        function animate() {
            if (animationRunning) return;
            animationRunning = true;

            function loop() {
                if (!isStarted && currentLevel === 10) {
                    animationRunning = false;
                    return;
                }

                requestAnimationFrame(loop);

                const delta = clock.getDelta();
                const time = clock.getElapsedTime();
                const u = stalkInstancedMesh.material.uniforms;

                u.uTime.value = time;
                u.uCalciumWave.value += delta * (u.uHeartRate.value / 60) * 3.5;

                const hAttrStalk = stalkInstancedMesh.geometry.attributes.aHeight;
                const hAttrTip = tipInstancedMesh.geometry.attributes.aHeight;

                for (let i = 0; i < TOTAL_STALKS; i++) {
                    currentHeights[i] = THREE.MathUtils.lerp(currentHeights[i], targetHeights[i], 0.05);
                    hAttrStalk.setX(i, currentHeights[i]);
                    hAttrTip.setX(i, currentHeights[i]);
                }

                hAttrStalk.needsUpdate = true;
                hAttrTip.needsUpdate = true;

                raycaster.setFromCamera(mouse, camera);

                const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
                const hit = new THREE.Vector3();

                if (raycaster.ray.intersectPlane(plane, hit)) {
                    u.uMouse.value.set(hit.x, hit.z);
                }

                if (analyser) {
                    const d = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(d);
                    const bars = document.querySelectorAll('.visualizer-bar');

                    for (let i = 0; i < bars.length; i++) {
                        bars[i].style.height = (d[i] / 255 * 30 + 10) + 'px';
                        bars[i].style.opacity = 0.2 + (d[i] / 255);
                    }
                }

                renderer.render(scene, camera);
            }

            loop();
        }
    </script>

</body>

</html>
